spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/carsharing_test
    username: test_user
    password: test_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  security:
    enabled: false
  flyway:
    enabled: false
